name: Backend CI

on:
  push:
    branches:
      - master
  pull_request:
    branches: 
      - master 
  workflow_dispatch:

jobs:
  testes:
    name: Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            backend/backend.csproj
            Tests/backend.Tests.csproj

      - name: Restaurar dependências
        run: dotnet restore Tests/backend.Tests.csproj

      - name: Executar testes
        run: dotnet test Tests/backend.Tests.csproj --configuration Release --no-restore

  build:
    name: Docker Build (Verificação)
    needs: testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Realizar o Build da Imagem
        run: docker build -t bueiro-inteligente-backend:latest -f backend/Dockerfile .

  deploy:
    name: Solicitar Deploy no Render
    needs: build 
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' 

    steps:
      - name: Disparar Hook de Deploy
        run: |
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK_URL }}      
