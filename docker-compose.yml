
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bueiro_backend
    env_file:
      - ./.env
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      PORT: "8080"
      PROJECT_NAME: "${PROJECT_NAME:-Bueiro Inteligente}"
      VERSION: "${VERSION:-1.0.0}"
      API_STR: "${API_STR:-/api/v1}"
      SECRET_KEY: "${SECRET_KEY}"
      ALGORITHM: "${ALGORITHM:-HS256}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      HARDWARE_TOKEN: "${HARDWARE_TOKEN}"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_LOCAL: "true"
      DB_LOCAL: "true"
      DATABASE_URL_CLOUD: "${DATABASE_URL_CLOUD}"
      DATABASE_URL_LOCAL: "postgresql+asyncpg://bueiro_user:bueiro_password@db:5432/bueiro_db"
      MIGRATIONS_URL: "postgresql+psycopg2://bueiro_user:bueiro_password@db:5432/bueiro_db"
      ROWS_API_KEY: "${ROWS_API_KEY}"
      ROWS_BASE_URL: "${ROWS_BASE_URL:-https://api.rows.com/v1}"
      ROWS_SPREADSHEET_ID: "${ROWS_SPREADSHEET_ID}"
      ROWS_TABLE_ID: "${ROWS_TABLE_ID}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "${DOTNET_SYSTEM_GLOBALIZATION_INVARIANT:-true}"
      APP_ID_SECRET: "${APP_ID_SECRET}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-*}"
      EMAIL_USERS_ADMIN: "${EMAIL_USERS_ADMIN}"
      LOG_DIRECTORY: "/app/log"
    volumes:
      - ./.env:/app/.env:ro
      - ./log:/app/log
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    networks:
      - bueiro_net
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: bueiro_db
    environment:
      POSTGRES_USER: "bueiro_user"
      POSTGRES_PASSWORD: "bueiro_password"
      POSTGRES_DB: "bueiro_db"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bueiro_net

  redis:
    image: redis:7-alpine
    container_name: bueiro_redis
    ports:
      - "6379:6379"
    networks:
      - bueiro_net

networks:
  bueiro_net:
    driver: bridge

volumes:
  postgres_data: